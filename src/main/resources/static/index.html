<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD KTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Website Pendataan KTP</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0" id="formTitle">Form KTP</h5>
                </div>
                <div class="card-body">
                    <form id="formKtp">
                        <input type="hidden" id="ktpId">

                        <div class="mb-3">
                            <label class="form-label">Nomor KTP (Unik)</label>
                            <input type="text" class="form-control" id="nomorKtp" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" id="namaLengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Alamat</label>
                            <textarea class="form-control" id="alamat" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Lahir</label>
                            <input type="date" class="form-control" id="tanggalLahir" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Jenis Kelamin</label>
                            <select class="form-select" id="jenisKelamin" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin...</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Simpan Data</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2" id="btnCancel" style="display: none;" onclick="resetForm()">Batal Edit</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-bordered table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Nomor KTP</th>
                            <th>Nama</th>
                            <th>Alamat</th>
                            <th>Tgl Lahir</th>
                            <th>L/P</th>
                            <th>Aksi</th>
                        </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();
    });

    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function(response) {
                let rows = '';
                $.each(response, function(index, ktp) {
                    rows += `<tr>
                        <td>${index + 1}</td>
                        <td>${ktp.nomorKtp}</td>
                        <td>${ktp.namaLengkap}</td>
                        <td>${ktp.alamat}</td>
                        <td>${ktp.tanggalLahir}</td>
                        <td>${ktp.jenisKelamin}</td>
                        <td>
                            <button class="btn btn-warning btn-sm mb-1" onclick="editData(${ktp.id})">Edit</button>
                            <button class="btn btn-danger btn-sm mb-1" onclick="deleteData(${ktp.id})">Hapus</button>
                        </td>
                    </tr>`;
                });
                $('#tableBody').html(rows);
            },
            error: function() {
                alert("Gagal memuat data dari server!");
            }
        });
    }

    $('#formKtp').submit(function(e) {
        e.preventDefault(); // Mencegah halaman refresh otomatis

        const id = $('#ktpId').val();
        const dataKtp = {
            nomorKtp: $('#nomorKtp').val(),
            namaLengkap: $('#namaLengkap').val(),
            alamat: $('#alamat').val(),
            tanggalLahir: $('#tanggalLahir').val(),
            jenisKelamin: $('#jenisKelamin').val()
        };

        const method = id ? "PUT" : "POST";
        const url = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: url,
            type: method,
            contentType: "application/json",
            data: JSON.stringify(dataKtp),
            success: function() {
                alert(id ? "Data sukses diupdate!" : "Data sukses ditambahkan!");
                resetForm();
                loadData(); // Refresh tabel tanpa reload page
            },
            error: function(xhr) {
                // Nangkep error dari backend (misal KTP kembar)
                alert("Error: " + xhr.responseJSON.message);
            }
        });
    });

    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function(ktp) {
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp);
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                // Ubah tampilan tombol
                $('#btnSubmit').text("Update Data").removeClass('btn-primary').addClass('btn-success');
                $('#btnCancel').show();
            }
        });
    }

    function deleteData(id) {
        if(confirm("Apakah kamu yakin ingin menghapus KTP ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function() {
                    alert("Data berhasil dihapus!");
                    loadData(); // Refresh tabel
                }
            });
        }
    }

    function resetForm() {
        $('#ktpId').val('');
        $('#formKtp')[0].reset();
        $('#btnSubmit').text("Simpan Data").removeClass('btn-success').addClass('btn-primary');
        $('#btnCancel').hide();
    }
</script>

</body>
</html>
